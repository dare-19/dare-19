name: ✨ Update Animated README

on:
  push:
    branches:
      - main
  schedule:
    # Run every 6 hours to keep metrics fresh
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔧 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📊 Update README metrics & timestamp
        run: |
          python3 << 'EOF'
          import json
          import re
          from datetime import datetime
          
          # Read current README
          with open('README.md', 'r') as f:
              content = f.read()
          
          # Update timestamp in multiple locations
          timestamp = datetime.utcnow().strftime('%Y-%m-%d')
          
          # Update the timestamp at bottom
          content = re.sub(
              r'Last Updated: \d{4}-\d{2}-\d{2}',
              f'Last Updated: {timestamp}',
              content
          )
          
          # Write back
          with open('README.md', 'w') as f:
              f.write(content)
          
          print("✅ README metrics updated successfully")
          print(f"⏱️  Timestamp: {timestamp}")
          EOF

      - name: 💾 Commit changes if needed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "chore: refresh animated readme [skip ci]"
            git push
          fi

      - name: ✨ Verify animated README
        run: |
          echo "✅ Animated README deployed!"
          wc -l README.md
